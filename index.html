<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Carol — OJ & 程序设计 AI 学习助手</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-page:#F9F0ED;--bg-surface:#fff;--bg-inset:#f3eae6;--bg-hover:#efe6e2;--border:#e4d9d4;--border-light:#eee5e0;--text-primary:#2e2826;--text-secondary:#6b625e;--text-muted:#a89e98;--green:#567357;--green-light:#eef3ee;--green-mid:#8da88e;--green-glow:rgba(86,115,87,0.12);--rose:#E58889;--rose-light:#f7edec;--rose-glow:rgba(229,136,137,0.12);--radius:10px;--radius-sm:7px;--radius-xs:5px;font-size:14.5px}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',Helvetica,Arial,sans-serif;background:var(--bg-page);color:var(--text-primary);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
h1,h2,h3,h4{font-weight:600;color:var(--text-primary)}
h1{font-size:1.5rem}h2{font-size:1.15rem}h3{font-size:.95rem}
button{cursor:pointer;font-family:inherit;border:none;outline:none;font-size:.88rem;transition:all .2s}
input,textarea,select{font-family:inherit;font-size:.88rem;background:var(--bg-surface);color:var(--text-primary);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .8rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 2px var(--green-glow)}
textarea{resize:vertical;min-height:80px}
::selection{background:var(--green-glow);color:var(--text-primary)}

/* ===== Header ===== */
.app-header{position:sticky;top:0;z-index:100;background:var(--bg-surface);border-bottom:1px solid var(--border-light)}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:.55rem 1rem}
.logo{display:flex;align-items:center;gap:.45rem;font-size:1rem}
.logo-text{font-weight:700;color:var(--green)}
.logo-sub{font-size:.7rem;color:var(--text-muted);font-weight:400;margin-left:.1rem}
.btn-api{display:flex;align-items:center;gap:.3rem;padding:.35rem .65rem;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.75rem}
.btn-api:hover{background:var(--bg-hover);color:var(--text-secondary)}
.btn-api.on{background:var(--green-light);color:var(--green);border-color:var(--green)}
.api-wrap{border-bottom:1px solid var(--border-light);background:var(--bg-surface)}

/* ===== Body ===== */
.app-body{display:flex;flex:1;max-width:1200px;margin:0 auto;padding:1rem;gap:1rem;width:100%;align-items:flex-start}
.side-left{width:220px;flex-shrink:0;position:sticky;top:62px}
.side-right{width:80px;flex-shrink:0;position:sticky;top:62px}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:.7rem}

/* ===== Surface ===== */
.surface{background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:1rem}

/* ===== Buttons ===== */
.btn-p{background:var(--green);color:#fff;padding:.55rem 1.4rem;border-radius:var(--radius-sm);font-weight:600}
.btn-p:hover{background:#4a654a}
.btn-p:active{opacity:.9}
.btn-p.rose{background:var(--rose)}
.btn-p.rose:hover{background:#d47778}
.btn-s{background:var(--bg-surface);color:var(--text-secondary);padding:.55rem 1.1rem;border-radius:var(--radius-sm);border:1px solid var(--border)}
.btn-s:hover{background:var(--bg-hover)}
.btn-g{background:transparent;color:var(--text-muted);padding:.3rem .6rem;border-radius:var(--radius-xs)}
.btn-g:hover{background:var(--bg-hover);color:var(--text-secondary)}

/* ===== Badge ===== */
.bdg{display:inline-flex;align-items:center;padding:.18rem .55rem;border-radius:4px;font-size:.7rem;font-weight:600;letter-spacing:.01em}
.bdg-g{background:var(--green-light);color:var(--green)}
.bdg-r{background:var(--rose-light);color:#c96a6b}
.bdg-w{background:rgba(201,168,76,0.12);color:#c9a84c}
.bdg-d{background:rgba(212,106,107,0.12);color:#d46a6b}

/* ===== History Panel ===== */
.hp{display:flex;flex-direction:column;gap:.45rem;max-height:calc(100vh - 90px);overflow-y:auto}
.hp-head{display:flex;align-items:center;justify-content:space-between}
.hp-title{font-size:.78rem;color:var(--text-secondary);font-weight:600}
.hp-clr{font-size:.68rem;padding:.12rem .4rem;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:4px}
.hp-clr:hover{color:var(--text-secondary);background:var(--bg-hover)}
.hp-clr.ok{color:var(--danger);border-color:var(--danger);background:rgba(212,106,107,.08)}
.hp-list{display:flex;flex-direction:column;gap:.25rem}
.hp-item{display:flex;flex-direction:column;gap:.12rem;padding:.4rem .5rem;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);text-align:left;cursor:pointer;transition:background .15s,border-color .15s}
.hp-item:hover{background:var(--bg-hover);border-color:var(--border-light)}
.hp-h{display:flex;align-items:center;justify-content:space-between;gap:.3rem}
.hp-bdg{font-size:.6rem;font-weight:600;padding:.04rem .3rem;border-radius:3px}
.hp-bdg.hp-g{background:var(--green-light);color:var(--green)}
.hp-bdg.hp-r{background:var(--rose-light);color:#c96a6b}
.hp-time{font-size:.6rem;color:var(--text-muted);flex-shrink:0}
.hp-pv{font-size:.7rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hp-rs{font-size:.63rem;color:var(--green-mid)}
.hp-em{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:1.2rem 0;color:var(--text-muted)}
.hp-em p{font-size:.72rem}

/* ===== Mode Tabs (right side) ===== */
.mt{padding:.35rem;position:sticky;top:62px}
.mt-tr{position:relative;display:flex;flex-direction:column;gap:.15rem}
.mt-btn{position:relative;z-index:2;padding:.65rem .4rem;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:.8rem;font-weight:600;text-align:center;letter-spacing:.04em;transition:color .2s}
.mt-btn:hover{color:var(--text-secondary)}
.mt-btn.on{color:var(--text-primary)}
.mt-ind{position:absolute;left:.15rem;width:calc(100% - .3rem);height:38px;background:var(--green-light);border-radius:var(--radius-sm);border:1px solid rgba(86,115,87,.15);z-index:1;pointer-events:none;transition:background .3s,border-color .3s}
.mt-ind.in-r{background:var(--rose-light);border-color:rgba(229,136,137,.2)}

/* ===== Input Panel ===== */
.ip{display:flex;flex-direction:column;gap:.55rem}
.ip-lb{font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:.2rem}
.dz{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:1.1rem;text-align:center;cursor:pointer;transition:background .2s,border-color .2s;background:var(--bg-inset);min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem}
.dz:hover{border-color:var(--green-mid);background:var(--green-light)}
.dz.drag{border-color:var(--green);background:var(--green-light);border-style:solid}
.dz.has{border-style:solid;border-color:var(--border);background:transparent}
.dz-t{color:var(--text-secondary);font-weight:600;font-size:.85rem}
.dz-st{color:var(--text-muted);font-size:.73rem}
.img-pv{position:relative;max-width:100%;max-height:260px;overflow:hidden;border-radius:var(--radius-sm)}
.img-pv img{max-width:100%;max-height:220px;object-fit:contain;display:block;border-radius:var(--radius-sm)}
.img-rm{position:absolute;top:5px;right:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);color:#fff;border-radius:50%;border:none;cursor:pointer}
.img-rm:hover{background:var(--danger)}
.dz-h{color:var(--text-muted);font-size:.7rem}

/* ===== Mode panels ===== */
.pn-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.1rem}
.pn-hd h3{font-size:.9rem}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.g-item{display:flex;gap:.45rem;padding:.5rem .6rem;background:var(--bg-inset);border-radius:var(--radius-sm)}
.g-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:.3rem}
.g-dot.g{background:var(--green)}
.g-dot.r{background:var(--rose)}
.g-item strong{display:block;font-size:.78rem;margin-bottom:.03rem}
.g-item p{font-size:.7rem;color:var(--text-muted);line-height:1.4}

/* ===== Form ===== */
.fg{display:flex;flex-direction:column;gap:.25rem}
.fl{font-size:.78rem;font-weight:600;color:var(--text-secondary)}
.eg{display:flex;flex-wrap:wrap;gap:.22rem}
.eb{padding:.18rem .4rem;background:var(--bg-inset);border:1.5px solid var(--border-light);border-radius:5px;cursor:pointer;transition:all .15s;font-size:.7rem;font-weight:600;color:var(--text-muted)}
.eb:hover{border-color:var(--green-mid);background:var(--green-light)}
.eb.on{border-color:var(--green);background:var(--green-light);color:var(--green)}
.eb.eb-d.on{border-color:var(--danger);background:rgba(212,106,107,.08);color:var(--danger)}
.eb.eb-w.on{border-color:#c9a84c;background:rgba(201,168,76,.08);color:#c9a84c}
.ec{font-family:'SF Mono','Fira Code','Consolas',monospace}
.ci{font-family:'SF Mono','Fira Code','Consolas','Courier New',monospace;font-size:.78rem;line-height:1.5;tab-size:4;padding:.6rem;min-height:120px}
.or{display:flex;gap:.22rem;flex-wrap:wrap}
.ob{padding:.28rem .6rem;background:var(--bg-inset);border:1.5px solid var(--border-light);border-radius:5px;cursor:pointer;font-size:.75rem;color:var(--text-secondary);transition:all .15s;font-weight:500}
.ob:hover{border-color:var(--green-mid);background:var(--green-light)}
.ob.on{border-color:var(--green);background:var(--green-light);color:var(--green)}

/* ===== Toggle ===== */
.tg{border:1px solid var(--border-light);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-inset)}
.tg-sum{display:flex;align-items:center;justify-content:space-between;padding:.45rem .6rem;cursor:pointer;font-size:.78rem;color:var(--text-secondary);font-weight:500;user-select:none}
.tg-sum:hover{background:var(--bg-hover)}
.tg-arw{transition:transform .2s}
.tg[open] .tg-arw{transform:rotate(180deg)}
.tg-bd{padding:.35rem .6rem .6rem;border-top:1px solid var(--border-light);display:flex;flex-direction:column;gap:.45rem}

/* ===== Result ===== */
.rp{display:flex;flex-direction:column;gap:.55rem}
.wb{display:flex;align-items:center;gap:.35rem;padding:.45rem .65rem;background:var(--green-light);border:1px solid rgba(86,115,87,.2);border-radius:var(--radius-sm);font-size:.75rem;color:var(--text-secondary)}
.wb strong{color:var(--green)}
.er{padding:.35rem .6rem;background:var(--rose-light);border:1px solid rgba(229,136,137,.2);border-radius:var(--radius-sm);font-size:.78rem;color:var(--danger)}
.sr{display:flex;gap:.35rem;align-items:center}
.sk{display:flex;flex-direction:column;gap:.45rem;padding:.7rem;background:var(--bg-inset);border-radius:var(--radius-sm)}
.sl{height:11px;border-radius:4px;animation:sh 1.5s ease-in-out infinite;background:linear-gradient(90deg,var(--bg-hover) 25%,var(--bg-surface) 50%,var(--bg-hover) 75%);background-size:200% 100%}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.w6{width:65%}.w8{width:85%}.w5{width:50%}.w7{width:75%}
.ra{display:flex;flex-direction:column;gap:.45rem}
.rh{display:flex;align-items:center;justify-content:space-between}
.rh h2{font-size:1rem}
.rs{background:var(--bg-surface);border:1px solid var(--border-light);border-left:3px solid var(--green);border-radius:var(--radius-sm);padding:.6rem .8rem}
.rt{font-size:.82rem;font-weight:600;margin-bottom:.3rem}
.rt.g{color:var(--green)}
.rt.r{color:#c96a6b}
.rl{font-size:.78rem;color:var(--text-secondary);line-height:1.5;padding:.1rem 0}
.cb{position:relative;background:#2a2624;border-radius:var(--radius-sm);overflow:hidden;margin-top:.3rem}
.cb pre{padding:.75rem;overflow-x:auto;font-size:.73rem;line-height:1.5}
.cb code{font-family:'SF Mono','Fira Code','Consolas','Courier New',monospace;color:#e8e0dc;white-space:pre}
.cb-cp{position:absolute;top:5px;right:5px;display:flex;align-items:center;gap:.2rem;padding:.18rem .45rem;background:rgba(255,255,255,.08);color:var(--text-muted);border:1px solid rgba(255,255,255,.06);border-radius:4px;font-size:.63rem;cursor:pointer}
.cb-cp:hover{background:rgba(255,255,255,.15);color:var(--text-secondary)}
.spn{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ===== API Config ===== */
.ac{padding:.75rem 1.25rem .9rem;max-width:600px;margin:0 auto}
.ac-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.ac-hd h3{display:flex;align-items:center;gap:.3rem;font-size:.9rem}
.ac-bd{display:flex;flex-direction:column;gap:.55rem}
.ac-r{display:flex;gap:.6rem}
.af{display:flex;flex-direction:column;gap:.22rem}
.af label{font-size:.73rem;color:var(--text-secondary);font-weight:600}
.f1{flex:1}
.rg{display:flex;align-items:center;gap:.35rem}
.rg input[type=range]{flex:1;padding:0;border:none;accent-color:var(--green);box-shadow:none}
.rg input[type=range]:focus{box-shadow:none}
.rv{font-size:.8rem;color:var(--text-secondary);min-width:1.3rem;text-align:center}
.kw{position:relative}
.ke{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:3px;display:flex}
.ke:hover{color:var(--text-secondary)}
.ac-act{display:flex;align-items:center;gap:.7rem;margin-top:.05rem}
.ac-note{font-size:.68rem;color:var(--text-muted)}

/* ===== History stats ===== */
.anal-sec h4{font-size:.73rem;color:var(--text-muted);margin-bottom:.22rem;font-weight:600}
.stat-r{display:flex;gap:.25rem}
.stat-i{flex:1;background:var(--bg-surface);border:1px solid var(--border-light);border-radius:var(--radius-xs);padding:.3rem;text-align:center}
.stat-i strong{display:block;font-size:.9rem;color:var(--text-muted)}
.stat-i span{font-size:.6rem;color:var(--text-muted)}
.mb{display:flex;gap:2px;border-radius:var(--radius-xs);overflow:hidden}
.m-s{flex:1;text-align:center;padding:.25rem .1rem;font-size:.62rem;font-weight:600}
.m-s.mm{background:var(--green-light);color:var(--green)}
.m-s.mo{background:rgba(86,115,87,.06);color:var(--green-mid)}
.m-s.mh{background:var(--rose-light);color:#c96a6b}
.m-s.mn{background:rgba(212,106,107,.06);color:var(--danger)}
.ol{list-style:none;display:flex;flex-direction:column;gap:.12rem;padding:0}
.ol li{font-size:.7rem;color:var(--text-muted);padding-left:.75rem;position:relative}
.ol li::before{content:'';position:absolute;left:0;top:.38em;width:4px;height:4px;border-radius:50%;background:var(--green)}

/* flow */
.fw{display:flex;gap:.45rem;align-items:flex-start}
.fn{flex-shrink:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:.65rem;font-weight:700}
.fw strong{display:block;font-size:.75rem;margin-bottom:.03rem}
.fw p{font-size:.7rem;color:var(--text-muted)}

/* knowledge */
.kg{display:flex;flex-direction:column;gap:.22rem}
.kl{font-size:.62rem;font-weight:600;padding:.04rem .35rem;border-radius:3px;width:fit-content}
.kl.b{background:var(--green-light);color:var(--green)}
.kl.a{background:var(--rose-light);color:#c96a6b}
.kl.h{background:rgba(122,155,181,.12);color:#7a9bb5}
.kt{display:flex;flex-wrap:wrap;gap:.22rem}
.kt span{font-size:.68rem;padding:.08rem .4rem;background:var(--bg-surface);border:1px solid var(--border-light);border-radius:4px;color:var(--text-secondary)}

.fade-enter-active,.fade-leave-active{transition:opacity .2s}
.fade-enter-from,.fade-leave-to{opacity:0}
</style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div v-if="loading" class="ls" :class="{ on: loading }">
    <div class="sp"></div>
    <h1 style="font-size:1.6rem;font-weight:700;color:#567357;margin:0">Carol</h1>
    <p style="color:#6b625e;margin-top:.3rem;font-size:.85rem">OJ & 程序设计 AI 学习助手</p>
  </div>

  <template v-if="!loading">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <h1 class="logo">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><rect x="2" y="2" width="28" height="28" rx="8" fill="#567357"/><path d="M10 16l4 4 8-8" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="logo-text">Carol</span>
          <span class="logo-sub">OJ & 程序设计</span>
        </h1>
        <button class="btn-api" :class="{ on: showApi }" @click="showApi = !showApi">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span>API</span>
        </button>
      </div>
    </header>

    <!-- API Config -->
    <transition name="fade">
      <div v-if="showApi" class="api-wrap" style="overflow:hidden">
        <api-config @close="showApi = false"></api-config>
      </div>
    </transition>

    <!-- Body -->
    <div class="app-body">
      <aside class="side-left"><history-panel></history-panel></aside>
      <main class="app-main">
        <input-panel></input-panel>
        <explain-panel v-if="store.activeMode === 'explain'"></explain-panel>
        <debug-panel v-if="store.activeMode === 'debug'"></debug-panel>
        <review-panel v-if="store.activeMode === 'review'"></review-panel>
        <result-panel></result-panel>
      </main>
      <aside class="side-right"><mode-tabs></mode-tabs></aside>
    </div>
  </template>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted, onUnmounted, nextTick, toRaw, watch, defineComponent } = Vue;

// ==============================
// Store
// ==============================
const savedApi = JSON.parse(localStorage.getItem('carol_api_config') || 'null');
const savedHistory = JSON.parse(localStorage.getItem('carol_history') || '[]');

const store = reactive({
  activeMode: 'explain',
  apiConfig: { endpoint: savedApi?.endpoint || 'https://api.openai.com/v1', model: savedApi?.model || 'gpt-4o', apiKey: savedApi?.apiKey || '', temperature: savedApi?.temperature ?? 0.7 },
  inputText: '', uploadedImage: null, uploadedImageUrl: null,
  debugErrorType: 'WA', userCode: '',
  reviewScope: 'all', practiceType: 'idea',
  isProcessing: false, result: null,
  history: savedHistory,

  setMode(m) { this.activeMode = m; this.result = null },
  setApiConfig(c) { Object.assign(this.apiConfig, c); localStorage.setItem('carol_api_config', JSON.stringify(this.apiConfig)) },
  setImage(f) { this.uploadedImage = f; this.uploadedImageUrl = f ? URL.createObjectURL(f) : null },
  clearInput() { this.inputText = ''; this.uploadedImage = null; this.uploadedImageUrl = null; this.userCode = '' },
  clearResult() { this.result = null },

  addHistory(entry) {

    if (this.history.length > 50) this.history.pop();
    localStorage.setItem('carol_history', JSON.stringify(this.history));
  },
  loadHistoryItem(item) {
    this.setMode(item.mode);
    if (item.fullResult) {

function isApiReady() { const c = store.apiConfig; return !!(c.apiKey && c.apiKey.startsWith('sk-')) }

async function chatComplete(messages) {
  const cfg = store.apiConfig;
  if (!cfg.apiKey) throw new Error('API_KEY_MISSING');
  const res = await fetch(`${cfg.endpoint.replace(/\/+$/, '')}/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${cfg.apiKey}` },
    body: JSON.stringify({ model: cfg.model, messages, temperature: cfg.temperature, stream: false }),
  });
  if (!res.ok) {
    let body = '';
    try { body = await res.text() } catch {}
    let msg = `请求失败 (${res.status})`;
    try { const e = JSON.parse(body); if (e.error?.message) msg = e.error.message } catch { if (body) msg = body }
    // Check if the error is about image/vision not being supported
    if (/image_url|image|vision|multimodal/i.test(msg) && /unknown variant|not support|unexpected|expected.*text/i.test(msg)) {
      throw new Error('IMAGE_NOT_SUPPORTED')
    }
    throw new Error(msg)
  }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

function parseResult(md, mode) {
  if (!md) return null;
  const lines = md.split('\n');
  const sections = []; let cur = null; let code = null; let cs = false;
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    if (l.startsWith('```')) {
      if (!cs) { cs = true; const cl = []; i++; while (i < lines.length && !lines[i].startsWith('```')) { cl.push(lines[i]); i++ } code = cl.join('\n').trim(); cs = false; continue }
    }
    const h = l.match(/^#{1,3}\s+(.+)/);
    if (h) { if (cur) sections.push(cur); cur = { title: h[1].trim(), content: [] }; continue }
    if (cur) { const t = l.replace(/^[-*]\s+/, '').trim(); if (t) cur.content.push(t) }
  }
  if (cur) sections.push(cur);
  const tm = { explain: '题目分析结果', debug: '代码纠错报告', review: '复习计划' };
  return { type: mode, title: tm[mode] || '分析结果', sections, code, raw: md };
}

    async function submit() {
      if (store.isProcessing) return; err.value = '';
      if (!isApiReady()) { err.value = '请先配置 API Key'; shake(); return }
      if (!store.inputText.trim() && !store.uploadedImage && !store.userCode.trim()) { err.value = store.activeMode==='debug'?'请粘贴代码':'请输入题目描述或上传截图'; shake(); return }
      if (store.activeMode==='debug' && !store.userCode.trim()) { err.value = '请粘贴代码'; shake(); return }

      store.isProcessing = true; store.clearResult(); pulse();
      try {
        let result;
        async function callWithImage(sys, msg) {
          if (!store.uploadedImage) return chatComplete([{ role: 'system', content: sys }, { role: 'user', content: msg }]);
          const b = await toBase64(store.uploadedImage);
          try {
            return await chatComplete([{ role: 'system', content: sys }, { role: 'user', content: [{ type: 'text', text: msg }, { type: 'image_url', image_url: { url: b } }] }]);
          } catch (imErr) {
            if (imErr.message === 'IMAGE_NOT_SUPPORTED') {
              err.value = '当前模型不支持图片输入，已自动跳过图片，仅使用文字分析';
              return chatComplete([{ role: 'system', content: sys }, { role: 'user', content: msg }]);
            }
            throw imErr;
          }
        }
        if (store.activeMode==='explain') {
          const sys = explainSysPrompt(); const desc = store.inputText.trim() || '请分析截图中这道 OJ 题目';
          const raw = await callWithImage(sys, desc); result = parseResult(raw, 'explain')
        } else if (store.activeMode==='debug') {
          const sys = debugSysPrompt(); const d = store.inputText.trim() ? `题目描述：${store.inputText.trim()}\n\n` : ''; const e = `提交状态：${store.debugErrorType}`; const c = `用户代码：\n\`\`\`\n${store.userCode}\n\`\`\``; const msg = `${d}${e}\n\n${c}`;
          const raw = await callWithImage(sys, msg); result = parseResult(raw, 'debug')
        } else {
          const sys = reviewSysPrompt(); const sm = { all: '全部错题', week: '最近一周', topic: '指定考点', errorType: '指定错误类型' }; const tm = { idea: '只看思路', full: '写完整代码', fill: '代码填空', core: '只写核心函数' };
          const msg = `复习范围：${sm[store.reviewScope]}\n练习形式：${tm[store.practiceType]}\n\n` + (store.inputText.trim() ? `补充：${store.inputText.trim()}\n` : '');
          const raw = await chatComplete([{ role: 'system', content: sys }, { role: 'user', content: msg }]); result = parseResult(raw, 'review')
        }
        store.addHistory(result);
        store.result = result;
        nextTick(() => { if (rres.value) { const tl = gsap.timeline({ defaults: { ease: 'power3.out' } }); const h = rres.value.querySelector('.rh'); if (h) tl.from(h, { y: -10, autoAlpha: 0, duration: .3 }); const items = rres.value.querySelectorAll('.rs'); if (items.length) tl.from(items, { y: 14, autoAlpha: 0, duration: .35, stagger: .05 }, '-=.05') } })
      } catch (ex) { err.value = ex.message === 'API_KEY_MISSING' ? '请先配置 API Key' : `请求失败：${ex.message}` }
      finally { store.isProcessing = false }
    }

    function pulse() { if (sbtn.value) gsap.timeline().to(sbtn.value, { scale: .95, duration: .1 }).to(sbtn.value, { scale: 1, duration: .1, ease: 'back.out(2)' }) }
    function shake() { if (sbtn.value) gsap.to(sbtn.value, { x: [-4, 4, -2, 2, -1, 1, 0], duration: .35 }) }
    function cpy() { if (store.result?.code) { if (navigator.clipboard) navigator.clipboard.writeText(store.result.code); else { const ta = document.createElement('textarea'); ta.value = store.result.code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta) } } }
    function clr() { store.clearInput(); store.clearResult(); err.value = '' }

    onMounted(() => { if (el.value) gsap.from(el.value.children, { y: 10, autoAlpha: 0, duration: .35, stagger: .04, ease: 'power2.out' }) });
    onUnmounted(() => gsap.killTweensOf(el.value?.children));
    return { el, rres, sbtn, store, err, apiReady, submit, cpy, clr }
  }
};

  props: ['close'],
  setup(props, { emit }) {
    const el = ref(null); const sk = ref(false);
    const f = reactive({ endpoint: store.apiConfig.endpoint, model: store.apiConfig.model, apiKey: store.apiConfig.apiKey, temperature: store.apiConfig.temperature });
    function save() { store.setApiConfig({ ...f }); emit('close') }
    onMounted(() => { if (el.value) gsap.from(el.value.children, { y: -6, autoAlpha: 0, duration: .25, stagger: .03, ease: 'power2.out' }) });
    onUnmounted(() => gsap.killTweensOf(el.value?.children));
    return { el, sk, f, save }
  }
};
